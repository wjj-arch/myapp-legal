<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术支持 - 加密文件夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
            padding: 20px;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .divider {
            height: 1px;
            background: #e8ecf1;
            margin: 24px 0;
        }
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #2d2d44;
            margin-top: 24px;
            margin-bottom: 12px;
        }
        p {
            color: #3d3d5c;
            margin-bottom: 8px;
        }
        .contact {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
        }
        .contact a {
            color: #4a6cf7;
            text-decoration: none;
            font-weight: 500;
        }
        .contact a:hover {
            text-decoration: underline;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .links a {
            display: inline-block;
            padding: 10px 24px;
            background: #f0f4ff;
            color: #4a6cf7;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #e0e8ff;
        }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #e8ecf1;
            color: #aaa;
            font-size: 12px;
        }
        @media (max-width: 480px) {
            .container { padding: 28px 20px; }
            h1 { font-size: 22px; }
            .links a { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📁</div>
        <h1>加密文件夹</h1>
        <p class="subtitle">技术支持中心</p>

        <div class="divider"></div>

        <h2>📧 联系开发者</h2>
        <div class="contact">
            <p>如有任何问题、建议或反馈，请通过以下方式联系我们：</p>
            <p style="font-size: 18px; margin-top: 8px;">
                <a href="mailto:782771381@qq.com">782771381@qq.com</a>
            </p>
            <p style="font-size: 14px; color: #888; margin-top: 4px;">我们会在 24 小时内回复</p>
        </div>

        <h2>🔗 相关链接</h2>
        <div class="links">
            <a href="privacy.html">📋 隐私政策</a>
            <a href="terms.html">📄 服务条款</a>
        </div>

        <div class="footer">
            加密文件夹 · 版本 1.0
        </div>
    </div>
</body>
</html>
